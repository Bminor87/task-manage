name: Task Manage System Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm run install:all

      - name: Create .env files from examples
        run: |
          cp backend/.env.example backend/.env
          cp frontend/.env.example frontend/.env

      - name: Build Backend
        run: npm run build:backend
      
      - name: Run Frontend Test
        run: npm run test:frontend

      - name: Run Backend Test
        run: npm run test:backend

      - name: Run Frontend Lint
        run: npm run lint:frontend

      - name: Run Backend Lint
        run: npm run lint:backend

      # Test Dockerization
      - name: Clean up docker volumes
        run: docker volume prune -f

      - name: Build Docker Containers
        run: docker compose up --build --abort-on-container-exit

      - name: Wait for Docker
        run: sleep 15

      - name: Check Backend Health
        run: curl -f http://localhost:5000/api/health || { echo "Backend health check failed"; exit 1; }

      - name: Check Frontend Health
        run: curl -f http://localhost:3000 || { echo "Frontend health check failed"; exit 1; }

      - name: Clean up Docker containers
        run: docker compose down -v

